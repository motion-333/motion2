<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout Builder</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <style>
    body{margin:0;font-family:'Outfit',sans-serif;display:flex;height:100vh;}
    #sidebar{width:220px;padding:10px;overflow-y:auto;border-right:2px solid #1449ff;box-sizing:border-box;}
    #sidebar select{width:100%;margin-bottom:10px;}
    #fileList img,#fileList video{width:100%;margin-bottom:8px;cursor:grab;}
    #grid{flex:1;position:relative;aspect-ratio:1;
      --s: calc(100%/32);
      background-color:#fff;
      background-image:
        repeating-linear-gradient(#1449ff 0 1px, transparent 1px var(--s)),
        repeating-linear-gradient(90deg,#1449ff 0 1px, transparent 1px var(--s));
      background-size:var(--s) var(--s);
    }
    #grid .item{position:absolute;border:2px solid #1449ff;box-sizing:border-box;cursor:move;}
    #grid .item img,#grid .item video{width:100%;height:100%;object-fit:cover;pointer-events:none;}
    #saveBtn{margin-top:10px;width:100%;}
  </style>
</head>
<body>
  <div id="sidebar">
    <select id="folderSelect"></select>
    <button id="saveBtn">Save Layout</button>
    <div id="fileList"></div>
  </div>
  <div id="grid"></div>
<script>
const CELL=32;
const folders = FOLDER_NAMES_PLACEHOLDER;
const folderFiles = FOLDER_FILES_PLACEHOLDER;
const select=document.getElementById('folderSelect');
const fileList=document.getElementById('fileList');
const grid=document.getElementById('grid');
let currentFolder=null;

folders.forEach(f=>{const o=document.createElement('option');o.value=f;o.textContent=f;select.appendChild(o);});

function gcd(a,b){return b?gcd(b,a%b):a;}

function setPos(item){
  item.style.left=`${(item.dataset.x/CELL)*100}%`;
  item.style.top=`${(item.dataset.y/CELL)*100}%`;
  item.style.width=`${(item.dataset.w/CELL)*100}%`;
  item.style.height=`${(item.dataset.h/CELL)*100}%`;
}

function makeDraggable(item){
  let sx,sy,ox,oy;
  item.addEventListener('mousedown',e=>{
    sx=e.clientX; sy=e.clientY;
    ox=parseFloat(item.dataset.x); oy=parseFloat(item.dataset.y);
    function move(ev){
      const r=grid.getBoundingClientRect();
      let nx=ox+(ev.clientX-sx)/r.width*CELL;
      let ny=oy+(ev.clientY-sy)/r.height*CELL;
      nx=Math.round(Math.max(0,Math.min(CELL-parseInt(item.dataset.w),nx)));
      ny=Math.round(Math.max(0,Math.min(CELL-parseInt(item.dataset.h),ny)));
      item.dataset.x=nx; item.dataset.y=ny;
      setPos(item);
    }
    function up(){
      document.removeEventListener('mousemove',move);
      document.removeEventListener('mouseup',up);
      saveLayout();
    }
    document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);
  });
}

function createItem(file,w,h,x,y){
  const ext=file.split('.').pop();
  const el=document.createElement(ext==='mp4'?'video':'img');
  el.src=`static/pf/${currentFolder}/${file}`;
  if(el.tagName==='VIDEO'){el.autoplay=true;el.loop=true;el.muted=true;}
  const item=document.createElement('div');
  item.className='item';
  item.dataset.file=file;
  item.dataset.w=w; item.dataset.h=h; item.dataset.x=x; item.dataset.y=y;
  item.appendChild(el);
  grid.appendChild(item);
  setPos(item);
  makeDraggable(item);
  return item;
}

function dropFile(file,px,py){
  const r=grid.getBoundingClientRect();
  let x=Math.floor(px/r.width*CELL);
  let y=Math.floor(py/r.height*CELL);
  const ext=file.split('.').pop();
  const el=document.createElement(ext==='mp4'?'video':'img');
  el.src=`static/pf/${currentFolder}/${file}`;
  if(el.tagName==='VIDEO'){el.autoplay=true;el.loop=true;el.muted=true;}
  const item=document.createElement('div');
  item.className='item';
  item.dataset.file=file;
  item.dataset.w=1; item.dataset.h=1; item.dataset.x=x; item.dataset.y=y;
  item.appendChild(el);
  grid.appendChild(item);
  makeDraggable(item);
  function finish(w,h){
    item.dataset.w=w; item.dataset.h=h;
    if(x+w> CELL) x=CELL-w;
    if(y+h> CELL) y=CELL-h;
    item.dataset.x=x; item.dataset.y=y;
    setPos(item);
    saveLayout();
  }
  if(el.tagName==='IMG'){
    el.onload=()=>{let g=gcd(el.naturalWidth,el.naturalHeight);let w=Math.round(el.naturalWidth/g);let h=Math.round(el.naturalHeight/g);if(w> CELL){h=Math.round(h*CELL/w);w=CELL;}if(h> CELL){w=Math.round(w*CELL/h);h=CELL;}finish(w,h);};
  }else{
    el.onloadedmetadata=()=>{let g=gcd(el.videoWidth,el.videoHeight);let w=Math.round(el.videoWidth/g);let h=Math.round(el.videoHeight/g);if(w> CELL){h=Math.round(h*CELL/w);w=CELL;}if(h> CELL){w=Math.round(w*CELL/h);h=CELL;}finish(w,h);};
  }
}

function loadFiles(folder){
  currentFolder=folder;
  fileList.innerHTML='';
  (folderFiles[folder]||[]).forEach(file=>{
    const ext=file.split('.').pop();
    const el=document.createElement(ext==='mp4'?'video':'img');
    el.src=`static/pf/${folder}/${file}`;
    if(el.tagName==='VIDEO'){el.autoplay=true;el.loop=true;el.muted=true;}
    el.draggable=true;
    el.addEventListener('dragstart',ev=>ev.dataTransfer.setData('text',file));
    fileList.appendChild(el);
  });
  grid.innerHTML='';
  const stored=localStorage.getItem('layout_'+folder);
  let data=[];
  if(stored){
    try{data=JSON.parse(stored);}catch(e){data=[];}
  }
  data.forEach(it=>{createItem(it.path,it.w,it.h,it.x,it.y);});
}
select.addEventListener('change',()=>loadFiles(select.value));
if(folders.length){select.value=folders[0];loadFiles(folders[0]);}

grid.addEventListener('dragover',e=>e.preventDefault());
grid.addEventListener('drop',e=>{e.preventDefault();const file=e.dataTransfer.getData('text');if(file)dropFile(file,e.offsetX,e.offsetY);});

document.getElementById('saveBtn').addEventListener('click',saveLayout);

function gatherItems(){
  const items=[];
  grid.querySelectorAll('.item').forEach(it=>{
    items.push({path:it.dataset.file,x:parseInt(it.dataset.x),y:parseInt(it.dataset.y),w:parseInt(it.dataset.w),h:parseInt(it.dataset.h)});
  });
  return items;
}

function saveLayout(){
  if(!currentFolder) return;
  const items=gatherItems();
  localStorage.setItem('layout_'+currentFolder,JSON.stringify(items));
}
</script>
</body>
</html>
