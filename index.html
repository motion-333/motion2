<!DOCTYPE html>
<html>
<head>
    <meta charset='UTF-8'>
    <title>Folder Grid</title>
    <link rel='stylesheet' href='static/style.css'>
</head>
<body>
    <div id='grid'>
    <div class='folder' data-name='example1'><div class='icon'>📁</div><div class='label'>example1</div></div>
<div class='folder' data-name='example2'><div class='icon'>📁</div><div class='label'>example2</div></div>

        </div>
    </div>
<script src='static/script.js'></script>
</body>
</html>
