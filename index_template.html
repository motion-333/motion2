<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Folder Orbit</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,100..1000&display=swap" rel="stylesheet">
  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; background:#fff; overflow:hidden; cursor:default; }
    #topbar { position:fixed; top:0; left:0; right:0; height:50px; display:flex; align-items:center; backdrop-filter:blur(10px); background:rgba(255,255,255,0.1); -webkit-mask-image:linear-gradient(to bottom, rgba(0,0,0,1), rgba(0,0,0,0)); mask-image:linear-gradient(to bottom, rgba(0,0,0,1), rgba(0,0,0,0)); z-index:5; }
    #topbar::after { content:""; position:absolute; top:0; left:0; right:0; bottom:-30px; background:linear-gradient(to bottom, rgba(255,255,255,0.9), rgba(255,255,255,0)); pointer-events:none; z-index:-1; }
    #logo { margin-left:20px; color:#1449ff; font-family:'Outfit',sans-serif; font-size:20px; letter-spacing:2px; width:140px; display:inline-block; overflow:hidden; }
    #tabs { flex:1; display:flex; justify-content:center; gap:8px; }
    .tab { position:relative; padding:10px 14px; margin:0 4px; cursor:pointer; color:#1449ff; font-family:'Outfit',sans-serif; --wght:400; --wdth:100; font-variation-settings:'wght' var(--wght),'wdth' var(--wdth); transition:font-variation-settings 0.4s ease, transform 0.4s ease; border-radius:8px; display:inline-flex; }
    .tab span { display:inline-block; --wght:inherit; --wdth:inherit; font-variation-settings:'wght' var(--wght),'wdth' var(--wdth); transition:font-variation-settings 0.4s ease, transform 0.4s ease; }
    .tab + .tab::before { content:""; position:absolute; left:-4px; top:25%; bottom:25%; width:1px; background:#1449ff66; }
    .tab:hover { --wdth:900; --wght:800; transform:scaleX(2); }
    .tab span:hover { --wdth:1500; --wght:900; transform:scaleX(3); }
    .glass { position:fixed; top:0; left:0; width:100vw; height:100vh; backdrop-filter:blur(20px) brightness(0.95); opacity:0; transition:opacity 0.8s ease-in-out; pointer-events:none; z-index:2; }
    .glass.visible { opacity:1; }
    #bgCanvas, #fgCanvas { position:absolute; top:0; left:0; width:100%; height:100%; }
    #bgCanvas { z-index:1; }
    #fgCanvas { z-index:3; pointer-events:none; }
    /* grid overlay */
    #gridOverlay { position:fixed; inset:0; display:none; z-index:4; justify-content:center; align-items:center; }
    #gridOverlay.show { display:flex; }
    #controls { position:absolute; top:10px; left:10px; background:rgba(255,255,255,0.9); padding:8px; border-radius:4px; z-index:10; display:flex; gap:8px; align-items:center; }
    #layoutWrapper { display:flex; flex-direction:column; align-items:center; }
    #header { width:calc(80vmin + 6px); display:flex; height:10vmin; margin-bottom:-3px; }
    #viewport { position:relative; overflow:hidden; width:80vmin; height:calc(80vmin*9/16); border:3px solid #1449ff; }
    #leftSquare { width:10vmin; height:100%; background:#eee; box-sizing:border-box; border:3px solid #1449ff; border-right:none; }
    #rightBox { flex:1; height:100%; overflow:hidden; display:flex; align-items:center; justify-content:center; box-sizing:border-box; border:3px solid #1449ff; border-left:3px solid #1449ff; }
    #rightBox .interactive-text { width:100%; white-space:nowrap; overflow:visible; font-family:'Roboto Flex', sans-serif; font-size:8vmin; color:#1449ff; text-align:center; }
    #rightBox .interactive-text .letter { display:inline-block; overflow:hidden; transition:width 0.2s ease; }
    #rightBox .interactive-text .letter .char { display:inline-block; transform-origin:left center; transition:transform 0.2s ease, font-variation-settings 0.2s ease; font-variation-settings:'wght' 400; }
    #gridContainer { position:absolute; top:50%; left:50%; width:100vw; height:100vh; transform:translate(-50%,-50%); background:#fff; }
    #grid { display:grid; grid-template-columns:repeat(80,1fr); grid-template-rows:repeat(45,1fr); gap:1px; width:100%; height:100%; }
    .cell { background:none; border:1px solid #1449ff; aspect-ratio:1/1; }
    .placed { position:absolute; overflow:hidden; }
    .placed img, .placed video { width:100%; height:100%; object-fit:cover; pointer-events:none; }
    .text-item { width:100%; height:100%; display:block; font-family:'Outfit', sans-serif; background:#fff; margin:0; padding:0; white-space:pre-wrap; box-sizing:border-box; outline:none; }
    /* labels */
    #labels { position:absolute; top:0; left:0; pointer-events:none; z-index:4; color:#1449ff; font-family:'Outfit', sans-serif; }
    .folder-label { position:absolute; font-size:14px; text-align:center; transform:translate(-50%,0); }
  </style>
</head>
<body>
  <div id="topbar">
    <div id="logo">['[]']'|' :[][\]</div>
    <div id="tabs">
      <div class="tab"><span>h</span><span>o</span><span>m</span><span>e</span></div>
      <div class="tab"><span>w</span><span>o</span><span>r</span><span>k</span></div>
      <div class="tab"><span>a</span><span>b</span><span>o</span><span>u</span><span>t</span></div>
    </div>
  </div>
  <div class="glass" id="glass"></div>
  <div id="gridOverlay">
    <div id="controls">
      <div id="message"></div>
      <select id="folderSelect"></select>
    </div>
    <div id="layoutWrapper">
      <div id="header">
        <div id="leftSquare"></div>
        <div id="rightBox"><div class="interactive-text"></div></div>
      </div>
      <div id="viewport">
        <div id="gridContainer">
          <div id="grid"></div>
        </div>
      </div>
    </div>
  </div>
  <div id="labels"></div>
  <canvas id="bgCanvas"></canvas>
  <canvas id="fgCanvas"></canvas>
  <script src="https://unpkg.com/three@0.148.0/build/three.min.js"></script>
  <script>
    const FOLDER_NAMES = __FOLDER_JSON__;
  </script>
  <script src="static/script.js"></script>
</body>
</html>
